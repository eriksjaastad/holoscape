name: Claude Code Review

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  claude-review:
    uses: eriksjaastad/tools/.github/workflows/claude-review-reusable.yml@main
    with:
      test_command: |
        echo "Swift tests require macOS — skipping on ubuntu runner"
      review_style: governance
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_GITHUB_API_KEY }}
