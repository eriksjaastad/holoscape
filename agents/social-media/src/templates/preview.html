<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1080px;
        height: 1080px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }

      .background {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          {{BACKGROUND}} 0%,
          {{PRIMARY}}22 50%,
          {{BACKGROUND}} 100%
        );
      }

      .glow {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          {{PRIMARY}}44 0%,
          {{SECONDARY}}22 40%,
          transparent 70%
        );
        filter: blur(60px);
      }

      .orb-container {
        position: relative;
        width: 400px;
        height: 400px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .orb {
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 30% 30%,
          {{PRIMARY}} 0%,
          {{SECONDARY}} 50%,
          {{PRIMARY}}88 100%
        );
        box-shadow:
          0 0 60px {{PRIMARY}}88,
          0 0 120px {{SECONDARY}}44,
          inset 0 0 60px {{ACCENT}}44;
        position: relative;
      }

      .orb::before {
        content: '';
        position: absolute;
        inset: 20px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 40% 40%,
          {{ACCENT}}66 0%,
          transparent 60%
        );
      }

      .particles {
        position: absolute;
        inset: -50px;
        background-image:
          radial-gradient(2px 2px at 20% 30%, {{ACCENT}} 50%, transparent),
          radial-gradient(2px 2px at 40% 70%, {{PRIMARY}} 50%, transparent),
          radial-gradient(2px 2px at 60% 20%, {{SECONDARY}} 50%, transparent),
          radial-gradient(2px 2px at 80% 60%, {{ACCENT}} 50%, transparent),
          radial-gradient(2px 2px at 30% 80%, {{PRIMARY}} 50%, transparent),
          radial-gradient(2px 2px at 70% 40%, {{SECONDARY}} 50%, transparent),
          radial-gradient(1px 1px at 10% 50%, {{ACCENT}}88 50%, transparent),
          radial-gradient(1px 1px at 90% 30%, {{PRIMARY}}88 50%, transparent),
          radial-gradient(1px 1px at 50% 90%, {{SECONDARY}}88 50%, transparent);
        opacity: 0.8;
      }

      .ring {
        position: absolute;
        width: 380px;
        height: 380px;
        border: 1px solid {{PRIMARY}}44;
        border-radius: 50%;
      }

      .ring-outer {
        position: absolute;
        width: 450px;
        height: 450px;
        border: 1px solid {{SECONDARY}}22;
        border-radius: 50%;
      }

      .text-container {
        position: absolute;
        bottom: 120px;
        text-align: center;
        z-index: 10;
      }

      .name {
        font-size: 48px;
        font-weight: 700;
        color: {{PRIMARY}};
        text-transform: uppercase;
        letter-spacing: 8px;
        text-shadow: 0 0 30px {{PRIMARY}}88;
        margin-bottom: 16px;
      }

      .vibe {
        font-size: 20px;
        font-weight: 400;
        color: {{SECONDARY}};
        letter-spacing: 2px;
        opacity: 0.9;
      }

      .logo {
        position: absolute;
        top: 60px;
        font-size: 14px;
        font-weight: 600;
        color: {{ACCENT}};
        letter-spacing: 4px;
        text-transform: uppercase;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="background"></div>
    <div class="glow"></div>

    <div class="logo">HOLOGRAM</div>

    <div class="orb-container">
      <div class="ring-outer"></div>
      <div class="ring"></div>
      <div class="orb"></div>
      <div class="particles"></div>
    </div>

    <div class="text-container">
      <div class="name">{{NAME}}</div>
      <div class="vibe">{{VIBE}}</div>
    </div>
  </body>
</html>
